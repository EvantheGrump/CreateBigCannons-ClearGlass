name: Compress Files

on:
  release:
    types: [published]

jobs:
  compress-job:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        mc_version: [1.21.1, 1.20.1, 1.19.2, 1.18.2]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set pack_format based on version
        id: set_pack_format
        run: |
          case "${{ matrix.mc_version }}" in
            1.21.1) echo "PACK_FORMAT=34" >> $GITHUB_ENV ;;
            1.20.1) echo "PACK_FORMAT=15" >> $GITHUB_ENV ;;
            1.19.2) echo "PACK_FORMAT=9" >> $GITHUB_ENV ;;
            1.18.2) echo "PACK_FORMAT=8" >> $GITHUB_ENV ;;
          esac

      - name: Update pack.mcmeta
        run: |
          jq --arg pf "$PACK_FORMAT" '.pack.pack_format = ($pf | tonumber)' src/pack.mcmeta > tmp.mcmeta
          mv tmp.mcmeta src/pack.mcmeta

      - name: Compress Directory
        uses: somaz94/compress-decompress@v1
        with:
          command: compress
          source: ./src
          format: zip
          includeRoot: 'false'

      - name: Rename file
        run: mv ./src/src.zip ./src/CreateBigCannons-ClearGlass-${{ matrix.mc_version }}.zip

      - name: Upload to Release
        uses: Shopify/upload-to-release@v2.0.0
        with:
          name: CreateBigCannons-ClearGlass-${{ matrix.mc_version }}.zip
          path: ./src/CreateBigCannons-ClearGlass-${{ matrix.mc_version }}.zip
          content-type: application/zip
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        uses: RubixDev/modrinth-upload@v1.0.2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          file_path: ./src/CreateBigCannons-ClearGlass-${{ matrix.mc_version }}.zip
          name: CreateBigCannons-ClearGlass-${{ matrix.mc_version }}.zip
          version: ${{ github.event.release.tag_name }}-${{ matrix.mc_version }}
          changelog: ${{ github.event.release.body }}
          game_versions: ${{ matrix.mc_version }}
          release_type: release
          loaders: "minecraft"
          featured: true
          project_id: 1ft9XWRu
